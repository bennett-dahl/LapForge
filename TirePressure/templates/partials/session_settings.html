{# Collapsible session settings — temp, tire set, roll-out pressures, notes #}
<details class="session-settings" id="session-settings">
  <summary class="session-settings-toggle">Session Settings</summary>
  <form method="post" action="{{ url_for('session_edit', id=session.id) }}" class="session-settings-form">
    <input type="hidden" name="unit" value="{{ 'psi' if use_psi else 'bar' }}">
    <input type="hidden" name="tool" value="{{ active_tool }}">

    <div class="settings-grid">
      <div class="settings-group">
        <label class="settings-label">Target pressure</label>
        <div style="display:flex;gap:0.35rem;align-items:center;">
          <input type="number" step="0.1" id="target_pressure_display" 
            class="settings-input" style="flex:1;"
            placeholder="{{ '%.1f'|format(target_psi if use_psi else target_bar) }}">
          <input type="hidden" id="target_pressure_psi" name="target_pressure_psi"
            value="{{ '%.1f'|format(session.target_pressure_psi) if session.target_pressure_psi is not none else '' }}">
          <div class="settings-radios" style="flex-shrink:0;">
            <label><input type="radio" name="target_unit" value="psi" {% if use_psi %}checked{% endif %}
              onchange="window._syncTargetUnit && window._syncTargetUnit()"> PSI</label>
            <label><input type="radio" name="target_unit" value="bar" {% if not use_psi %}checked{% endif %}
              onchange="window._syncTargetUnit && window._syncTargetUnit()"> Bar</label>
          </div>
        </div>
        <script>
        (function(){
          var BAR_TO_PSI = 14.5038;
          var displayEl = document.getElementById('target_pressure_display');
          var hiddenEl  = document.getElementById('target_pressure_psi');
          var storedPsi = {{ session.target_pressure_psi if session.target_pressure_psi is not none else 'null' }};

          function getSelectedUnit() {
            var checked = document.querySelector('input[name="target_unit"]:checked');
            return checked ? checked.value : 'psi';
          }

          function initDisplay() {
            if (storedPsi == null) { displayEl.value = ''; return; }
            if (getSelectedUnit() === 'bar') {
              displayEl.value = (storedPsi / BAR_TO_PSI).toFixed(2);
              displayEl.step = '0.01';
              displayEl.min = '0.9'; displayEl.max = '2.5';
            } else {
              displayEl.value = storedPsi.toFixed(1);
              displayEl.step = '0.1';
              displayEl.min = '14'; displayEl.max = '35';
            }
          }

          window._syncTargetUnit = function() {
            var curVal = parseFloat(displayEl.value);
            if (isNaN(curVal)) { initDisplay(); return; }
            if (getSelectedUnit() === 'bar') {
              displayEl.value = (curVal / BAR_TO_PSI).toFixed(2);
              displayEl.step = '0.01';
              displayEl.min = '0.9'; displayEl.max = '2.5';
            } else {
              displayEl.value = (curVal * BAR_TO_PSI).toFixed(1);
              displayEl.step = '0.1';
              displayEl.min = '14'; displayEl.max = '35';
            }
            syncHidden();
          };

          function syncHidden() {
            var curVal = parseFloat(displayEl.value);
            if (isNaN(curVal)) { hiddenEl.value = ''; return; }
            if (getSelectedUnit() === 'bar') {
              hiddenEl.value = (curVal * BAR_TO_PSI).toFixed(1);
            } else {
              hiddenEl.value = curVal.toFixed(1);
            }
          }

          displayEl.addEventListener('input', syncHidden);
          initDisplay();
        })();
        </script>
      </div>

      <div class="settings-group">
        <label class="settings-label">Temp unit</label>
        <div class="settings-radios">
          <label><input type="radio" name="temp_unit" value="c" {% if not use_fahrenheit %}checked{% endif %}> °C</label>
          <label><input type="radio" name="temp_unit" value="f" {% if use_fahrenheit %}checked{% endif %}> °F</label>
        </div>
      </div>

      <div class="settings-group">
        <label class="settings-label" for="ambient_temp_c">Ambient temp</label>
        <input type="number" step="0.1" id="ambient_temp_c" name="ambient_temp_c"
          value="{{ '%.1f'|format(session.ambient_temp_c * 9/5 + 32) if use_fahrenheit and session.ambient_temp_c is not none else ('%.1f'|format(session.ambient_temp_c) if session.ambient_temp_c is not none else '') }}"
          placeholder="—" class="settings-input">
      </div>

      <div class="settings-group">
        <label class="settings-label" for="track_temp_c">Track temp</label>
        <input type="number" step="0.1" id="track_temp_c" name="track_temp_c"
          value="{{ '%.1f'|format(session.track_temp_c * 9/5 + 32) if use_fahrenheit and session.track_temp_c is not none else ('%.1f'|format(session.track_temp_c) if session.track_temp_c is not none else '') }}"
          placeholder="—" class="settings-input">
      </div>

      <div class="settings-group">
        <label class="settings-label" for="tire_set_id">Tire set</label>
        <select name="tire_set_id" id="tire_set_id" class="settings-input">
          <option value="">— None —</option>
          {% for ts in tire_sets %}
          <option value="{{ ts.id }}" {% if session.tire_set_id == ts.id %}selected{% endif %}>{{ ts.name }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="settings-group">
        <label class="settings-label">Track Map</label>
        <div style="display:flex;gap:0.35rem;align-items:center;">
          <select id="track_layout_id" class="settings-input" style="flex:1;">
            <option value="">— Auto (by track name) —</option>
            {% if track_layouts is defined %}
            {% for tl in track_layouts %}
            <option value="{{ tl.id }}" {% if session.track_layout_id == tl.id %}selected{% endif %}>{{ tl.name }} ({{ tl.track_name }})</option>
            {% endfor %}
            {% endif %}
          </select>
          <button type="button" class="btn btn-sm" id="btn-apply-layout" title="Apply">Apply</button>
        </div>
        <script>
        (function(){
          document.getElementById('btn-apply-layout').addEventListener('click', function(){
            var val = document.getElementById('track_layout_id').value || null;
            fetch('/api/sessions/{{ session.id }}/track-layout', {
              method: 'PATCH',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({track_layout_id: val})
            }).then(function(r) { return r.json(); }).then(function(d) {
              if (d.ok) location.reload();
              else alert(d.error || 'Failed to set track map.');
            });
          });
        })();
        </script>
      </div>

      <div class="settings-group settings-group-wide">
        <label class="settings-label">Roll-out pressures (bar)</label>
        <div class="rollout-grid">
          <div>
            <label class="settings-sublabel" for="roll_out_fl">FL</label>
            <input type="number" step="0.01" id="roll_out_fl" name="roll_out_pressure_fl"
              value="{{ '%.2f'|format(session.roll_out_pressure_fl) if session.roll_out_pressure_fl is not none else '' }}"
              placeholder="—" class="settings-input">
          </div>
          <div>
            <label class="settings-sublabel" for="roll_out_fr">FR</label>
            <input type="number" step="0.01" id="roll_out_fr" name="roll_out_pressure_fr"
              value="{{ '%.2f'|format(session.roll_out_pressure_fr) if session.roll_out_pressure_fr is not none else '' }}"
              placeholder="—" class="settings-input">
          </div>
          <div>
            <label class="settings-sublabel" for="roll_out_rl">RL</label>
            <input type="number" step="0.01" id="roll_out_rl" name="roll_out_pressure_rl"
              value="{{ '%.2f'|format(session.roll_out_pressure_rl) if session.roll_out_pressure_rl is not none else '' }}"
              placeholder="—" class="settings-input">
          </div>
          <div>
            <label class="settings-sublabel" for="roll_out_rr">RR</label>
            <input type="number" step="0.01" id="roll_out_rr" name="roll_out_pressure_rr"
              value="{{ '%.2f'|format(session.roll_out_pressure_rr) if session.roll_out_pressure_rr is not none else '' }}"
              placeholder="—" class="settings-input">
          </div>
        </div>
      </div>

      <div class="settings-group settings-group-wide">
        <label class="settings-label" for="lap_count_notes">Notes</label>
        <textarea name="lap_count_notes" id="lap_count_notes" class="settings-input" rows="2" placeholder="Lap count, conditions, setup notes…">{{ session.lap_count_notes or '' }}</textarea>
      </div>
    </div>

    <div class="settings-actions">
      <button type="submit" class="btn">Save settings</button>
    </div>
  </form>
</details>
