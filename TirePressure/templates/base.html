<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Race Data Analysis{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  {% block head %}{% endblock %}
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="sb-brand">
      <svg class="sb-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      <span class="sb-title">Race Data</span>
    </div>

    <nav class="sb-nav">
      <a href="{{ url_for('index') }}" class="sb-link{% if request.path == '/' %} active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z"/></svg>
        <span class="sb-label">Home</span>
      </a>
      <a href="{{ url_for('sessions_list') }}" class="sb-link{% if '/sessions' in request.path and '/compare' not in request.path %} active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2m8 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"/></svg>
        <span class="sb-label">Sessions</span>
      </a>
      <a href="{{ url_for('upload') }}" class="sb-link{% if request.path == '/upload' %} active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M12 4v12m0-12L8 8m4-4l4 4"/></svg>
        <span class="sb-label">Upload</span>
      </a>
      <a href="{{ url_for('compare_list') }}" class="sb-link{% if '/compare' in request.path %} active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 19V6l12-3v13M9 19c0 1.1-1.3 2-3 2s-3-.9-3-2 1.3-2 3-2 3 .9 3 2zM21 16c0 1.1-1.3 2-3 2s-3-.9-3-2 1.3-2 3-2 3 .9 3 2z"/></svg>
        <span class="sb-label">Compare</span>
      </a>

      <div class="sb-divider"></div>

      <a href="{{ url_for('car_drivers_list') }}" class="sb-link{% if '/car_drivers' in request.path %} active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87m-4-12a4 4 0 010 7.75"/></svg>
        <span class="sb-label">Car / Driver</span>
      </a>
      <a href="{{ url_for('tire_sets_list') }}" class="sb-link{% if '/tire_sets' in request.path %} active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/><path d="M12 2a15 15 0 010 20M2 12a15 15 0 0120 0"/></svg>
        <span class="sb-label">Tire Sets</span>
      </a>
      <a href="{{ url_for('track_layouts_list') }}" class="sb-link{% if '/track-layouts' in request.path %} active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
        <span class="sb-label">Track Maps</span>
      </a>
      <a href="{{ url_for('settings') }}" class="sb-link{% if request.path == '/settings' %} active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        <span class="sb-label">Settings</span>
      </a>
    </nav>

    <div class="sb-footer">
      <button class="sb-collapse-btn" id="sb-toggle" title="Collapse sidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 17l-5-5 5-5M18 17l-5-5 5-5"/></svg>
        <span class="sb-label">Collapse</span>
      </button>
    </div>
  </aside>

  <main class="main-content" id="main-content">
    <div class="{{ 'container-full' if full_width is defined and full_width else 'container' }}">
      {% block content %}{% endblock %}
    </div>
  </main>

  <script>
  (function() {
    var sidebar = document.getElementById('sidebar');
    var toggle = document.getElementById('sb-toggle');
    var KEY = 'sidebar_collapsed';
    if (localStorage.getItem(KEY) === '1') {
      sidebar.classList.add('collapsed');
    }
    toggle.addEventListener('click', function() {
      sidebar.classList.toggle('collapsed');
      localStorage.setItem(KEY, sidebar.classList.contains('collapsed') ? '1' : '0');
    });
  })();
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
