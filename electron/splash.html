<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 420px; height: 280px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #111114; color: #e4e4e7;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    border-radius: 12px;
    -webkit-app-region: drag;
    overflow: hidden;
  }
  .logo-img {
    height: 100px;
    margin-bottom: 24px;
    object-fit: contain;
  }
  .subtitle {
    font-size: 12px;
    color: #a1a1aa;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  .spinner-track {
    width: 200px; height: 3px;
    background: #27272a; border-radius: 2px;
    overflow: hidden;
  }
  .spinner-fill {
    width: 40%; height: 100%;
    background: linear-gradient(90deg, #b8860b, #daa520, #c8a000);
    border-radius: 2px;
    animation: slide 1.2s ease-in-out infinite;
  }
  @keyframes slide {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(350%); }
  }
</style>
</head>
<body>
  <img class="logo-img" src="../LapForge/static/images/logo.png" alt="LapForge"
       onerror="this.style.display='none';document.getElementById('fallback').style.display='block';">
  <div id="fallback" style="display:none;font-size:22px;font-weight:700;color:#daa520;margin-bottom:24px;">LAPFORGE</div>
  <div class="subtitle">Forging Performance from Data</div>
  <div class="spinner-track"><div class="spinner-fill"></div></div>
</body>
</html>
