<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 400px; height: 300px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #18181b; color: #e4e4e7;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    border-radius: 12px;
    -webkit-app-region: drag;
    overflow: hidden;
  }
  .logo {
    width: 64px; height: 64px; margin-bottom: 20px;
    stroke: #3b82f6; fill: none;
  }
  .title { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
  .subtitle { font-size: 13px; color: #a1a1aa; margin-bottom: 24px; }
  .spinner-track {
    width: 200px; height: 4px;
    background: #27272a; border-radius: 2px;
    overflow: hidden;
  }
  .spinner-fill {
    width: 40%; height: 100%;
    background: #3b82f6; border-radius: 2px;
    animation: slide 1.2s ease-in-out infinite;
  }
  @keyframes slide {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(350%); }
  }
</style>
</head>
<body>
  <svg class="logo" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="10"/>
    <path d="M12 6v6l4 2"/>
  </svg>
  <div class="title">LapForge</div>
  <div class="subtitle">Starting&hellip;</div>
  <div class="spinner-track"><div class="spinner-fill"></div></div>
</body>
</html>
