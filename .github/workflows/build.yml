name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Freeze Python backend
        run: python -m PyInstaller --clean --noconfirm LapForge.spec

      - name: Verify backend output
        run: |
          if (!(Test-Path "dist/backend/LapForge.exe")) {
            Write-Error "Backend executable not found"
            exit 1
          }
        shell: pwsh

      - name: Install Electron dependencies
        run: npm ci
        working-directory: electron

      - name: Build Electron installer
        run: npx electron-builder --win --publish always
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
