{% extends "base.html" %}
{% block title %}{{ 'Edit' if car_driver else 'Add' }} car/driver{% endblock %}
{% block content %}
  <h1>{{ 'Edit' if car_driver else 'Add' }} car/driver</h1>
  <form method="post">
    <label>Car (identifier or number)</label>
    <input type="text" name="car_identifier" value="{{ car_driver.car_identifier if car_driver else '' }}" required placeholder="e.g. #404 or Badenia 3xx #404">
    <label>Driver name</label>
    <input type="text" name="driver_name" value="{{ car_driver.driver_name if car_driver else '' }}" required placeholder="e.g. Dave Hollars">
    <p style="margin-top:1rem;">
      <button type="submit" class="btn">Save</button>
      <a href="{{ url_for('car_drivers_list') }}" class="btn btn-secondary">Cancel</a>
    </p>
  </form>
{% endblock %}
