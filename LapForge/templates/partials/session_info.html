{# Session information — editable core fields + raw file metadata #}
<details class="session-settings" id="session-info" open>
  <summary class="session-settings-toggle">Session Information</summary>
  <form method="post" action="{{ url_for('session_edit', id=session.id) }}" class="session-settings-form">
    <input type="hidden" name="unit" value="{{ 'psi' if use_psi else 'bar' }}">
    <input type="hidden" name="tool" value="{{ active_tool }}">

    <div class="settings-grid">
      <div class="settings-group">
        <label class="settings-label" for="si-car-driver">Car / Driver</label>
        <select name="car_driver_id" id="si-car-driver" class="settings-input">
          {% for cd in car_drivers %}
          <option value="{{ cd.id }}" {% if cd.id == session.car_driver_id %}selected{% endif %}>{{ cd.display_name() }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="settings-group">
        <label class="settings-label" for="si-session-type">Session type</label>
        <select name="session_type" id="si-session-type" class="settings-input">
          {% for st in session_types %}
          <option value="{{ st.value }}" {% if session.session_type == st %}selected{% endif %}>{{ st.value }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="settings-group">
        <label class="settings-label" for="si-track">Track</label>
        <input type="text" name="track" id="si-track" value="{{ session.track }}" class="settings-input">
      </div>

      <div class="settings-group">
        <label class="settings-label" for="si-driver">Driver</label>
        <input type="text" name="driver" id="si-driver" value="{{ session.driver }}" class="settings-input">
      </div>

      <div class="settings-group">
        <label class="settings-label" for="si-car">Car</label>
        <input type="text" name="car" id="si-car" value="{{ session.car }}" class="settings-input">
      </div>

      <div class="settings-group">
        <label class="settings-label" for="si-outing">Outing #</label>
        <input type="text" name="outing_number" id="si-outing" value="{{ session.outing_number }}" class="settings-input">
      </div>

      <div class="settings-group">
        <label class="settings-label" for="si-session-num">Session #</label>
        <input type="text" name="session_number" id="si-session-num" value="{{ session.session_number }}" class="settings-input">
      </div>
    </div>

    <div class="settings-actions">
      <button type="submit" class="btn">Save info</button>
    </div>
  </form>

  {% if file_metadata %}
  <details class="file-metadata-details">
    <summary class="file-metadata-toggle">File Metadata</summary>
    <table class="file-metadata-table">
      {% for key, value in file_metadata.items() %}
      <tr>
        <td class="fm-key">{{ key }}</td>
        <td class="fm-val">{{ value }}</td>
      </tr>
      {% endfor %}
    </table>
  </details>
  {% endif %}
</details>
